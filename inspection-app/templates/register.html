{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<h2>Register</h2>
<form method="post">{{ form.hidden_tag() }}
<div>{{ form.username.label }} {{ form.username() }}</div>
<div>{{ form.password.label }} {{ form.password() }}</div>
<div>{{ form.confirm.label }} {{ form.confirm() }}</div>
<div>{{ form.submit() }}</div>
</form>
{% endblock %}
